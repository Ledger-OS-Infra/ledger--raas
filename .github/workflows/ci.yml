name: Ledger-core CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  server:
    name: Server (typecheck, migrate, test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
          POSTGRES_DB: ledger_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Run migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://ledger:ledger@localhost:5432/ledger_core_test
          # Node16 tsconfig requires explicit .ts extensions; override so knex migration runner resolves correctly
          TS_NODE_COMPILER_OPTIONS: '{"module":"CommonJS","moduleResolution":"node"}'

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://ledger:ledger@localhost:5432/ledger_core_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker (build production images)
    runs-on: ubuntu-latest
    needs: [server, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build
